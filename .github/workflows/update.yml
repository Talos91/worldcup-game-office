name: Update office league scores

# Runs on GitHub's servers — no laptop needed.
on:
  schedule:
    # Every 2 hours (minute 7 to dodge the top-of-hour backlog). GitHub runs
    # scheduled jobs best-effort, so frequent polling keeps scores fresh.
    - cron: "7 */2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate data.json
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python3 update_scores.py

      - name: Commit & push if the scores changed
        run: |
          if [ -n "$(git status --porcelain data.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "chore: update office league scores [skip ci]"
            git push
          else
            echo "No score changes."
          fi
